<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UMMAH</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              'ummah': {
                // Refined Light Mode Tokens
                'bg-light': '#F8F9F6',
                'text-light': '#0E3B2E',
                'icon-active-light': '#0E6F4F',
                'icon-inactive-light': '#8FAEA1',
                'mint': '#F0F9F6',
                
                // Refined Dark Mode Tokens (Deep Navy / Charcoal)
                'bg-dark': '#0F172A',
                'card-dark': '#1E293B',
                'text-dark': '#F1F5F9',
                'text-secondary-dark': '#94A3B8',
                'icon-active-dark': '#10B981',
                'icon-inactive-dark': '#475569',
                
                // Shared Accents
                'gold': '#C5A059',
                'emerald': '#059669',
              }
            },
            fontFamily: {
              inter: ['Inter', 'sans-serif'],
              amiri: ['Amiri', 'serif'],
              playfair: ['Playfair Display', 'serif'],
              poppins: ['Poppins', 'sans-serif'],
            },
            borderRadius: {
              '3xl': '1.5rem',
              '4xl': '2rem',
              '5xl': '3rem',
            },
            boxShadow: {
              'premium': '0 20px 60px -15px rgba(6, 78, 59, 0.08)',
              'soft': '0 10px 40px -10px rgba(0, 0, 0, 0.03)',
              'glow': '0 0 20px rgba(16, 185, 129, 0.15)',
              'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.37)',
            }
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Amiri:wght@400;700&family=Playfair+Display:wght@400;700;900&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #F8F9F6;
            color: #0E3B2E;
            -webkit-font-smoothing: antialiased;
            letter-spacing: -0.011em;
        }
        .dark body {
            background-color: #0F172A;
            color: #F1F5F9;
            letter-spacing: 0.015em;
        }
        .arabic-text {
            font-family: 'Amiri', serif;
        }
        .premium-header {
            font-family: 'Playfair Display', serif;
            letter-spacing: -0.02em;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .green-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .green-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .green-scrollbar::-webkit-scrollbar-thumb {
            background: #0E6F4F;
            border-radius: 20px;
        }
        .dark .green-scrollbar::-webkit-scrollbar-thumb {
            background: #10B981;
        }
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-up {
            animation: fade-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .pattern-bg {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l15 30-15 30-15-30z' fill='%230e6f4f' fill-opacity='0.03' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
        .dark .pattern-bg {
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0l15 30-15 30-15-30z' fill='%2310b981' fill-opacity='0.02' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
        
        .glass-orb {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.2);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
    </style>
</head>
<body class="transition-colors duration-700">
    <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
